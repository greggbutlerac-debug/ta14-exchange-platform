name: Verify

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify application
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Display runtime versions
        run: |
          node --version
          npm --version

      - name: Install pinned npm version
        run: npm install --global npm@10.8.1

      - name: Confirm npm version
        run: npm --version

      - name: Install dependencies
        run: npm ci --no-audit --no-fund
        timeout-minutes: 12

      - name: Run typecheck
        run: npm run typecheck

      - name: Run automated tests
        run: npm test

      - name: Build production application
        run: npm run build
