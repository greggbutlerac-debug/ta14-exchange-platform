name: CI
on:
  push:
  pull_request:
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses:name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Show runtime versions
        run: |
          node --version
          npm --version

      - name: Install stable npm
        run: npm install --global npm@10.8.0

      - name: Clean npm cache
        run: npm cache clean --force

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --prefer-offline

      - name: Verify platform
        run: npm run verify

      - name: Build platform
        run: npm run build actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run verify
